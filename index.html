<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIFT Search — Kurumsal Bilgi Sistemi</title>
    <meta name="description" content="AIFT Search: Yerel bilgi tabanı üzerinden yüksek doğruluklu veri erişimi ve analiz sistemi.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Theme */

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-surface: #1a1a26;
            --bg-glass: rgba(26, 26, 38, 0.65);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-accent: rgba(99, 102, 241, 0.3);
            --text-primary: #e8e8ed;
            --text-secondary: #8b8b9e;
            --text-muted: #55556a;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --accent-hover: #818cf8;
            --user-bubble: #4f46e5;
            --ai-bubble: #171721;
            --success: #34d399;
            --error: #f87171;
            --radius: 14px;
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */

        .sidebar {
            width: 320px;
            min-width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .sidebar-header h2 {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            background: rgba(52, 211, 153, 0.1);
            color: var(--success);
            border: 1px solid rgba(52, 211, 153, 0.2);
        }

        .status-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .context-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .context-list::-webkit-scrollbar {
            width: 4px;
        }

        .context-list::-webkit-scrollbar-thumb {
            background: var(--border-subtle);
            border-radius: 4px;
        }

        .context-card {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle);
            border-left: 3px solid var(--accent);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
            font-size: 12.5px;
            line-height: 1.65;
            color: var(--text-secondary);
            transition: border-color 0.2s ease;
            animation: fadeSlideIn 0.3s ease forwards;
            opacity: 0;
        }

        .context-card:hover {
            border-color: var(--border-accent);
        }

        .context-card-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .context-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .context-empty-icon {
            font-size: 32px;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        .sidebar-footer {
            padding: 14px 20px;
            border-top: 1px solid var(--border-subtle);
            font-size: 11px;
            color: var(--text-muted);
        }

        .sidebar-footer .latency {
            color: var(--accent);
            font-weight: 600;
        }

        /* Main */

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .main-header {
            padding: 18px 28px;
            border-bottom: 1px solid var(--border-subtle);
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .main-header h1 {
            font-size: 17px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .main-header h1 span {
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .chip {
            font-size: 10.5px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
        }

        /* Messages */

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .messages::-webkit-scrollbar {
            width: 5px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
        }

        .msg {
            display: flex;
            gap: 12px;
            max-width: 75%;
            animation: fadeSlideIn 0.35s ease forwards;
            opacity: 0;
        }

        .msg.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
        }

        .msg.user .msg-avatar {
            background: var(--user-bubble);
        }

        .msg.ai .msg-avatar {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
        }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 14px;
            line-height: 1.7;
            word-break: break-word;
        }

        .msg.user .msg-bubble {
            background: var(--user-bubble);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .msg.ai .msg-bubble {
            background: var(--ai-bubble);
            border: 1px solid var(--border-subtle);
            border-bottom-left-radius: 4px;
        }

        .msg-error .msg-bubble {
            background: rgba(248, 113, 113, 0.1);
            border-color: rgba(248, 113, 113, 0.3);
            color: var(--error);
        }

        /* Typing indicator */
        .typing-dots {
            display: flex;
            gap: 5px;
            padding: 4px 0;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.16s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.32s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Welcome */
        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 12px;
            color: var(--text-muted);
        }

        .welcome-icon {
            font-size: 48px;
            margin-bottom: 4px;
            opacity: 0.6;
        }

        .welcome h2 {
            font-size: 20px;
            color: var(--text-primary);
            font-weight: 600;
        }

        .welcome p {
            font-size: 13.5px;
            max-width: 380px;
            line-height: 1.7;
        }

        /* Input */

        .input-bar {
            padding: 16px 28px 20px;
            border-top: 1px solid var(--border-subtle);
            background: var(--bg-secondary);
        }

        .input-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 14px;
            padding: 4px 6px 4px 18px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .input-wrap:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-wrap input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            padding: 10px 0;
        }

        .input-wrap input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 38px;
            height: 38px;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        .send-btn:hover {
            background: var(--accent-hover);
        }

        .send-btn:active {
            transform: scale(0.92);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ================================================================
           RESPONSIVE
           ================================================================ */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0; top: 0; bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
            }
            .sidebar.open { transform: translateX(0); }

            .msg { max-width: 90%; }
        }

        /* Toggle button for mobile */
        .sidebar-toggle {
            display: none;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .sidebar-toggle { display: block; }
        }
        /* Sample Questions */
        .sample-questions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 20px;
            width: 100%;
            max-width: 400px;
        }

        .sample-btn {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sample-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
            background: var(--bg-glass);
            transform: translateY(-2px);
        }

        .sample-btn::before {
            content: '→';
            color: var(--accent);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>📡 Retrieved Context</h2>
            <div class="status-badge">Engine Active</div>
        </div>
        <div class="context-list" id="contextList">
            <div class="context-empty">
                <div class="context-empty-icon">🔍</div>
                Bir soru sorduğunuzda<br>ilgili dokümanlar burada görünür.
            </div>
        </div>
        <div class="sidebar-footer" id="sidebarFooter">
            AIFT Search v1.0 · Güvenli Yerel Erişim
        </div>
    </aside>

    <!-- Main -->

    <main class="main">
        <header class="main-header">
            <h1>
                <button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent);"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <span>AIFT Search</span>
            </h1>
            <div class="chip">Doğrulanmış Bilgi Sistemi</div>
        </header>

        <div class="messages" id="messages">
            <div class="welcome" id="welcome">
                <div class="welcome-icon">🔍</div>
                <h2>AIFT Search</h2>
                <div class="sample-questions">
                    <button class="sample-btn" onclick="fillQuery('Panama Kanalı hangi okyanusları birbirine bağlar?')">Panama Kanalı hangi okyanusları birbirine bağlar?</button>
                    <button class="sample-btn" onclick="fillQuery('Hakkı Ögelman nerede doktora yaptı?')">Hakkı Ögelman nerede doktora yaptı?</button>
                    <button class="sample-btn" onclick="fillQuery('11 Eylül saldırılarında kaç kişi hayatını kaybetti?')">11 Eylül saldırılarında kaç kişi hayatını kaybetti?</button>
                    <button class="sample-btn" onclick="fillQuery('Tibet\'teki İslami etki nereden gelmiştir?')">Tibet'teki İslami etki nereden gelmiştir?</button>
                </div>
            </div>
        </div>

        <div class="input-bar">
            <div class="input-wrap">
                <input
                    type="text"
                    id="queryInput"
                    placeholder="Bilgi tabanınıza bir soru sorun..."
                    autocomplete="off"
                    autofocus
                >
                <button class="send-btn" id="sendBtn" onclick="handleSend()" title="Gönder">➤</button>
            </div>
        </div>
    </main>

    <!-- Logic -->

    <script>
        // DOM referansları
        const messagesEl = document.getElementById('messages');
        const welcomeEl  = document.getElementById('welcome');
        const inputEl    = document.getElementById('queryInput');
        const sendBtn    = document.getElementById('sendBtn');
        const contextEl  = document.getElementById('contextList');
        const footerEl   = document.getElementById('sidebarFooter');

        // Enter tuşu ile gönder
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        /** Send handler */

        async function handleSend() {
            const query = inputEl.value.trim();
            if (!query) return;

            // Welcome ekranını kaldır
            if (welcomeEl) welcomeEl.remove();

            // Kullanıcı mesajını ekle
            appendMessage('user', query);
            inputEl.value = '';
            setLoading(true);

            // Typing indicator
            const typingEl = appendTyping();
            const startTime = performance.now();

            try {
                const backendUrl = '/api/ask';
                const response = await fetch(backendUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    typingEl.remove();
                    appendMessage('ai', errorData.detail || 'Sunucu hatası.', true);
                    return;
                }

                // Chunked response okuyucu
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                // AI Mesaj kabuğunu oluştur
                typingEl.remove();
                const aiBubbleEl = createAiMessageBubble();
                let fullText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6).trim();
                            if (dataStr === '[DONE]') break;

                            try {
                                const data = JSON.parse(dataStr);
                                
                                // 1. Context geldiyse sidebar'ı güncelle
                                if (data.context) {
                                    renderContext(data.context);
                                }
                                
                                // 2. Chunk geldiyse baloncuk içine ekle
                                if (data.chunk) {
                                    fullText += data.chunk;
                                    aiBubbleEl.textContent = fullText;
                                    scrollToBottom();
                                }

                                // 3. Hata mesajı geldiyse
                                if (data.error) {
                                    aiBubbleEl.classList.add('msg-error');
                                    aiBubbleEl.textContent = data.error;
                                }
                            } catch (e) {
                                // JSON parse hatası (yarım chunk durumu nadirdir ama olabilir)
                                console.error("Stream parse error:", e);
                            }
                        }
                    }
                }

                const latency = ((performance.now() - startTime) / 1000).toFixed(2);
                footerEl.innerHTML = `⏱️ <span class="latency">${latency}s</span> · AIFT Search (Streaming)`;

            } catch (err) {
                typingEl.remove();
                appendMessage('ai', `Bağlantı hatası: ${err.message}`, true);
            } finally {
                setLoading(false);
            }
        }

        /** Append message */

        function appendMessage(role, text, isError = false) {
            const div = document.createElement('div');
            div.className = `msg ${role}${isError ? ' msg-error' : ''}`;

            const avatar = role === 'user' ? '👤' : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10H12V2z"></path><path d="M12 2a10 10 0 0 1 10 10H12V2z"></path><path d="M12 12L2.8 2.2"></path><path d="M12 12L16.2 2.2"></path><circle cx="12" cy="12" r="3"></circle></svg>';
            div.innerHTML = `
                <div class="msg-avatar">${avatar}</div>
                <div class="msg-bubble">${escapeHtml(text)}</div>
            `;

            messagesEl.appendChild(div);
            scrollToBottom();
            return div;
        }

        /** Create AI bubble */

        function createAiMessageBubble() {
            const div = document.createElement('div');
            div.className = `msg ai`;
            div.innerHTML = `
                <div class="msg-avatar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle></svg></div>
                <div class="msg-bubble"></div>
            `;
            messagesEl.appendChild(div);
            return div.querySelector('.msg-bubble');
        }

        /** Typing indicator */

        function appendTyping() {
            const div = document.createElement('div');
            div.className = 'msg ai';
            div.id = 'typing-indicator';
            div.innerHTML = `
                <div class="msg-avatar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle></svg></div>
                <div class="msg-bubble">
                    <div class="typing-dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            messagesEl.appendChild(div);
            scrollToBottom();
            return div;
        }

        /** Render context */

        function renderContext(contextList) {
            if (!contextList.length) return;

            contextEl.innerHTML = '';
            contextList.forEach((doc, i) => {
                const card = document.createElement('div');
                card.className = 'context-card';
                card.style.animationDelay = `${i * 0.08}s`;
                card.innerHTML = `
                    <div class="context-card-label">Doküman ${i + 1}</div>
                    ${escapeHtml(doc)}
                `;
                contextEl.appendChild(card);
            });
        }

        // Yardımcı fonksiyonlar
        function setLoading(isLoading) {
            sendBtn.disabled = isLoading;
            inputEl.disabled = isLoading;
            if (!isLoading) inputEl.focus();
        }

        function scrollToBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        /** Fill query */

        function fillQuery(text) {
            inputEl.value = text;
            inputEl.focus();
            handleSend();
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
